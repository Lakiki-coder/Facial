version: '3.8'

services:
  # Frontend React Application
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_SERVER_URL=https://172.16.0.125:3001
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - signaling-server
    networks:
      - webrtc-network
    restart: unless-stopped

  # Signaling Server (WebRTC + Socket.io)
  signaling-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - webrtc-network
    restart: unless-stopped

  # AI Backend (Spring Boot - Java)
  ai-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ai-models:/app/models
      - deep-live-cam:/app/deep-live-cam
    environment:
      - SERVER_PORT=8080
      - AI_PROCESSING_DEEP_LIVE_CAM_PATH=/app/deep-live-cam
      - AI_PROCESSING_TARGET_FACE_PATH=/app/models/faces
      - AI_PROCESSING_VOICE_MODEL_PATH=/app/models/voices
    networks:
      - webrtc-network
    restart: unless-stopped
    # GPU support (uncomment for NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Deep-Live-Cam (Face Swap - Python)
  deep-live-cam:
    image: python:3.10
    container_name: deep-live-cam
    volumes:
      - ./Deep_Live_Project/Deep-Live-Cam:/app
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt && 
               python run.py --source 0 --headless"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - webrtc-network
    restart: unless-stopped
    # GPU support for face swapping
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # RVC (Voice Conversion - Python)
  rvc:
    image: python:3.10
    container_name: rvc
    volumes:
      - ./RVC-WebUI:/app
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt &&
               python infer.py --api --port 8000"
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - webrtc-network
    restart: unless-stopped
    # GPU support for voice conversion
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

networks:
  webrtc-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  ai-models:
    driver: local
  deep-live-cam:
    driver: local
